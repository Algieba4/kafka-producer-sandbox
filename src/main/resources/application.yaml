cron.status: "* * * * * ?"

management:
  endpoint.health.probes.enabled: true
  endpoints.web.exposure.include: health, info
  health:
    livenessstate.enabled: true
    readinessstate.enabled: true
  metrics:
    enable:
      kafka: true
    tags:
      app-name: kafka-producer
      application: kafka-producer
  opentelemetry:
    resource-attributes:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
      OTEl_SERVICE_NAME: kafka-producer
  tracing:
    propagation.type: w3c
    sampling.probability: 1.0

server.port: 5000

spring:
  application.name: kafka-producer
  kafka:
    bootstrap-servers: localhost:9092
    listener.observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties.enable.idempotence: false
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    template.observation-enabled: true
    topic.status: order.status
  profiles.default: local
